version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gpt_line_core
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  api:
    build: .
    env_file: .env.example
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/gpt_line_core
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis

volumes:
  pg_data:
